<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Analytics Chat</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <!-- <h2 class="sidebar-title">History</h2> -->
          <div class="sidebar-actions">
            <a class="button button-secondary nav-link-btn" href="./dashboard.html">Dashboard</a>
            <a class="button button-secondary nav-link-btn" href="./tables.html">Tables</a>
            <button id="btnNewConversation" class="button button-secondary">New</button>
          </div>
        </div>
        <div id="historyList" class="history-list"></div>
      </aside>

      <section class="content">
        <header class="content-header">
          <div class="header-left">
            <button id="btnToggleSidebar" class="menu-btn">☰</button>
            <div>
              <h1 class="title">AI Analytics Chat</h1>
              <p class="subtitle">
                Ask naturally. AI responds with text, table, chart, or SQL as needed.
              </p>
            </div>
          </div>
        </header>

        <section id="chatTimeline" class="chat-timeline"></section>

        <section class="composer" aria-label="Message composer">
          <div class="composer-bar">
            <button
              class="composer-icon"
              type="button"
              title="Add (coming soon)"
              aria-label="Add"
              disabled
            >
              +
            </button>

            <textarea
              id="prompt"
              class="composer-input"
              placeholder="Ask anything"
              aria-label="Message"
            ></textarea>

            <div class="composer-right">
              <button
                class="composer-icon"
                type="button"
                title="Voice (coming soon)"
                aria-label="Voice"
                disabled
              >
                🎙️
              </button>
              <button id="btnAnalyze" class="composer-send" type="button">Send</button>
            </div>
          </div>

          <div id="error" class="error hidden"></div>
        </section>
      </section>
    </main>

    <script src="../chartjs-chart-wc/dist/chartjs-chart-wc/browser/main.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
